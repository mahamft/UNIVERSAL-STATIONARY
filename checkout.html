<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Universal Stationary</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root { --kids-blue: #4CC9FE; --kids-pink: #FF4D91; --kids-yellow: #FFF200; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff; padding-top: 50px;
        }
        .checkout-card {
            background: white; border-radius: 30px; padding: 30px;
            border: 4px solid var(--kids-blue); box-shadow: 10px 10px 0 var(--kids-yellow);
        }
        .form-control { border-radius: 15px; padding: 12px; border: 2px solid #eee; margin-bottom: 15px; }
        .btn-order {
            background: var(--kids-pink); color: white; border: none; padding: 15px;
            border-radius: 30px; font-weight: 700; font-size: 1.2rem; width: 100%;
            box-shadow: 0 5px 0 #D6336C; transition: 0.2s;
        }
        .btn-order:active { transform: translateY(4px); box-shadow: none; }
        
        #orderOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row g-4">
        <!-- Delivery Form -->
        <div class="col-md-7">
            <div class="checkout-card">
                <h2 class="mb-4" style="color:var(--kids-blue); font-family: 'Fredoka';">Delivery Details 🏠</h2>
                <form id="orderForm" onsubmit="event.preventDefault(); placeOrder();">
                    <div class="row">
                        <div class="col-md-6"><input type="text" class="form-control" placeholder="First Name" required></div>
                        <div class="col-md-6"><input type="text" class="form-control" placeholder="Last Name" required></div>
                    </div>
                    <input type="text" class="form-control" placeholder="Full Street Address" required>
                    <input type="tel" class="form-control" placeholder="Phone Number (e.g. 0300...)" required>
                    
                    <h5 class="mt-3">Payment Method 💳</h5>
                    <select class="form-control" required>
                        <option value="">Select Payment</option>
                        <option>Cash on Delivery</option>
                        <option>JazzCash / EasyPaisa</option>
                        <option>Bank Transfer</option>
                    </select>

                    <button type="submit" class="btn-order mt-3">Confirm My Order 🎉</button>
                </form>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-md-5">
            <div class="checkout-card">
                <h4 style="color:var(--kids-pink); font-family: 'Fredoka';">Order Summary 🧾</h4>
                <hr>
                <div id="summaryItems"></div>
                <div class="d-flex justify-content-between mt-3 fs-4 fw-bold">
                    <span>Total:</span>
                    <span style="color:var(--kids-blue)">RS <span id="finalTotal">0</span></span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Success Overlay -->
<div id="orderOverlay">
    <h1 style="font-size: 5rem;">✨🛍️✨</h1>
    <h2 style="color: var(--kids-pink); font-family: 'Fredoka';">ORDER PLACED SUCCESSFULLY!</h2>
    <p class="fs-5 mt-2 text-center">Your Order ID is: <strong id="orderID"></strong><br>Our team will contact you shortly.</p>
    <button class="btn btn-primary rounded-pill px-4" onclick="window.location.href='home.html'">Return to Home</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    window.onload = () => {
        const cart = JSON.parse(localStorage.getItem('universalCart')) || [];
        const container = document.getElementById('summaryItems');
        let total = 0;

        if(cart.length === 0) {
            container.innerHTML = "<p>No items in bag.</p>";
            return;
        }

        container.innerHTML = cart.map(item => {
            total += item.price;
            return `<div class="d-flex justify-content-between mb-2">
                        <span>${item.name}</span>
                        <span>RS ${item.price}</span>
                    </div>`;
        }).join('');

        document.getElementById('finalTotal').innerText = total;
    };

    function placeOrder() {
        const orderID = "UNIV-" + Math.floor(100000 + Math.random() * 900000);
        document.getElementById('orderID').innerText = orderID;
        
        // Show Success Overlay
        document.getElementById('orderOverlay').style.display = 'flex';
        
        // Clear Cart
        localStorage.removeItem('universalCart');

        // Confetti Celebration
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#4CC9FE', '#FF4D91', '#FFF200']
        });
    }
</script>
</body>
</html>
